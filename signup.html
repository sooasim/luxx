<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewport-meta">
    <script>
        // 모바일 스마트폰에서도 데스크탑 레이아웃이 자연스럽게 보이도록 처리
        if (screen.width < 1280) {
            document.getElementById('viewport-meta').setAttribute('content', 'width=1280');
        }
    </script>
    <title>Sign Up | LUXX - Luxury Auction Exchange</title>
    <!-- LUXX 브랜드 파비콘 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080705'/><polygon points='23,18 0,40 18,40' fill='%233A2D05'/><polygon points='23,18 18,40 50,40 50,18' fill='%23F5D57B' opacity='.9'/><polygon points='77,18 50,18 50,40 82,40' fill='%23D4AF37'/><polygon points='77,18 82,40 100,40' fill='%239B7A1C'/><polygon points='0,40 18,40 50,68' fill='%237A5E10'/><polygon points='18,40 82,40 50,68' fill='%23FFF5C0' opacity='.9'/><polygon points='82,40 100,40 50,68' fill='%239B7A1C'/><polygon points='0,40 50,68 50,95' fill='%233A2D05'/><polygon points='100,40 50,95 50,68' fill='%235A440A'/><polyline points='23,18 0,40 50,95 100,40 77,18' fill='none' stroke='%23D4AF37' stroke-width='2.5' stroke-linejoin='round'/><line x1='23' y1='18' x2='77' y2='18' stroke='%23F5D57B' stroke-width='3'/></svg>">
    <!-- 폰트 및 아이콘 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Nanum+Myeongjo:wght@400;700;800&family=Inter:wght@300;400;500;600;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        brand: ['"Cinzel"', 'serif'],
                        display: ['"Playfair Display"', '"Nanum Myeongjo"', 'Georgia', 'serif'],
                        serif: ['"Playfair Display"', '"Nanum Myeongjo"', 'Georgia', 'serif'],
                        sans: ['Inter', '"Nanum Gothic"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            gold: '#D4AF37',
                            'gold-light': '#F5D57B',
                            'gold-dark': '#9B7A1C',
                            black: '#0A0A0A',
                            dark: '#111111'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 3px; }

        body { background: #0A0A0A; background-image: radial-gradient(ellipse at top, rgba(212,175,55,0.06) 0%, #0A0A0A 60%); }

        .glass-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212,175,55,0.15);
        }
        .glass-card-gold {
            background: linear-gradient(135deg, rgba(212,175,55,0.07) 0%, rgba(15,15,15,0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.25);
            border-top-color: rgba(245,213,123,0.4);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(212,175,55,0.05);
        }
        .gold-text {
            background: linear-gradient(135deg, #D4AF37, #F5D57B, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .input-gold {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.2);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            transition: all 0.2s;
        }
        .input-gold:focus {
            outline: none;
            border-color: rgba(212,175,55,0.5);
            background: rgba(212,175,55,0.05);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
        }
        .input-gold::placeholder { color: rgba(255,255,255,0.3); }
        .btn-gold {
            background: linear-gradient(135deg, #9B7A1C 0%, #D4AF37 30%, #F5D57B 50%, #D4AF37 70%, #9B7A1C 100%);
            color: #0A0A0A;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            cursor: pointer;
            border: none;
            font-size: 15px;
            letter-spacing: 0.05em;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-1px); }
        .divider-gold { border-color: rgba(212,175,55,0.15); }
        @keyframes shimmer { 0%{background-position:200% center} 100%{background-position:-200% center} }
    </style>
</head>
<body class="text-white font-sans overflow-x-hidden antialiased flex flex-col min-h-screen">

    <!-- 상단 네비게이션 -->
    <header class="fixed w-full top-0 z-50 glass-card border-b-0">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <!-- 로고 -->
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="flex items-center justify-center">
                    <svg width="36" height="41" viewBox="0 0 52 60" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="da1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF0A0"/><stop offset="100%" stop-color="#B89020"/></linearGradient>
    <linearGradient id="da2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#9B7A1C"/></linearGradient>
    <linearGradient id="da3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B7A1C"/><stop offset="100%" stop-color="#5A440A"/></linearGradient>
    <linearGradient id="da4" x1=".5" y1="0" x2=".5" y2="1"><stop offset="0%" stop-color="#FFF5C0"/><stop offset="100%" stop-color="#D4AF37"/></linearGradient>
    <linearGradient id="da5" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#7A5E10"/></linearGradient>
    <linearGradient id="da6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7A5E10"/><stop offset="100%" stop-color="#3A2D05"/></linearGradient>
    <linearGradient id="da7" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F5D57B"/><stop offset="100%" stop-color="#9B7A1C"/></linearGradient>
  </defs>
  <polygon points="12,8 0,20 10,20" fill="url(#da3)"/>
  <polygon points="12,8 10,20 26,20 26,8" fill="url(#da1)"/>
  <polygon points="40,8 26,8 26,20 42,20" fill="url(#da2)"/>
  <polygon points="40,8 42,20 52,20" fill="url(#da5)"/>
  <polygon points="0,20 10,20 26,36" fill="url(#da3)"/>
  <polygon points="10,20 42,20 26,36" fill="url(#da4)"/>
  <polygon points="42,20 52,20 26,36" fill="url(#da5)"/>
  <polygon points="0,20 26,36 26,56" fill="url(#da6)"/>
  <polygon points="52,20 26,56 26,36" fill="url(#da5)"/>
  <polyline points="12,8 0,20 26,56 52,20 40,8" fill="none" stroke="url(#da7)" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="12" y1="8" x2="40" y2="8" stroke="#F5D57B" stroke-width="1.5"/>
  <line x1="12" y1="8" x2="10" y2="20" stroke="#F5D57B" stroke-width="0.7" opacity="0.7"/>
  <line x1="26" y1="8" x2="26" y2="20" stroke="#F5D57B" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="8" x2="42" y2="20" stroke="#D4AF37" stroke-width="0.7" opacity="0.7"/>
  <line x1="0" y1="20" x2="52" y2="20" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
  <line x1="10" y1="20" x2="26" y2="36" stroke="#D4AF37" stroke-width="0.6" opacity="0.6"/>
  <line x1="42" y1="20" x2="26" y2="36" stroke="#D4AF37" stroke-width="0.6" opacity="0.6"/>
  <line x1="26" y1="36" x2="26" y2="56" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
</svg>
                </div>
                <div class="flex flex-col justify-center">
                    <div class="flex items-end gap-2 mb-1">
                        <span style="font-family:'Cinzel',serif;font-weight:700;font-size:1.5rem;letter-spacing:0.32em;background:linear-gradient(110deg,#7A5C0A 0%,#C9A22A 18%,#F5D57B 38%,#FFE999 50%,#F5D57B 62%,#C9A22A 82%,#7A5C0A 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;">LUXX</span>
                        <span class="text-[10px] font-mono px-2 py-0.5 rounded tracking-[0.1em] leading-none mb-0.5" style="background:rgba(212,175,55,0.1);color:#D4AF37;border:1px solid rgba(212,175,55,0.3);">luxxbid.com</span>
                    </div>
                    <span class="text-[9px] font-semibold tracking-[0.18em] uppercase leading-none" style="color:rgba(255,255,255,0.7);">
                        Luxury Auction Exchange
                    </span>
                </div>
            </div>

            <!-- 우측 액션 -->
            <div class="flex items-center gap-3 text-sm font-semibold">
                <a href="login.html" class="hidden sm:inline-flex items-center gap-1 px-4 py-2 rounded-full transition" style="border:1px solid rgba(212,175,55,0.25);color:rgba(212,175,55,0.8);background:rgba(212,175,55,0.05);" onmouseover="this.style.background='rgba(212,175,55,0.1)'" onmouseout="this.style.background='rgba(212,175,55,0.05)'">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    <span>Sign In</span>
                </a>
            </div>
        </div>
    </header>

    <!-- 메인 -->
    <main class="flex-grow flex items-center justify-center pt-28 pb-20 px-6 relative z-10">
        <!-- 배경 블러 원 -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] rounded-full blur-[120px] pointer-events-none -z-10" style="background:rgba(212,175,55,0.06);"></div>
        <div class="absolute top-1/4 right-1/4 w-[400px] h-[400px] rounded-full blur-[100px] pointer-events-none -z-10" style="background:rgba(212,175,55,0.04);"></div>

        <!-- 회원가입 카드 -->
        <div class="glass-card-gold max-w-lg w-full rounded-[2rem] shadow-2xl p-8 md:p-10">
            <div class="mb-8 text-center">
                <h1 class="text-3xl md:text-4xl font-bold mb-3">Create Your LUXX Account</h1>
                <p class="text-sm md:text-base" style="color:rgba(255,255,255,0.7);">
                    단 한 번의 가입으로 LUXX 글로벌 옥션 및 Vault 서비스에 접근할 수 있습니다.
                </p>
            </div>

            <form action="#" method="post" class="space-y-6">
                <!-- 이름 -->
                <div>
                    <label for="full_name" class="block text-[11px] font-bold mb-2 uppercase tracking-[0.18em]" style="color:rgba(212,175,55,0.8);">
                        Full Name
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user" style="color:rgba(212,175,55,0.4);"></i>
                        </span>
                        <input
                            id="full_name"
                            name="full_name"
                            type="text"
                            required
                            placeholder="홍길동 / John Doe"
                            class="input-gold pl-11 pr-4 text-sm md:text-base"
                        />
                    </div>
                </div>

                <!-- 이메일 -->
                <div>
                    <label for="signup_email" class="block text-[11px] font-bold mb-2 uppercase tracking-[0.18em]" style="color:rgba(212,175,55,0.8);">
                        Email (LUXX ID)
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope" style="color:rgba(212,175,55,0.4);"></i>
                        </span>
                        <input
                            id="signup_email"
                            name="email"
                            type="email"
                            required
                            placeholder="member@luxxbid.com"
                            class="input-gold pl-11 pr-4 text-sm md:text-base"
                        />
                    </div>
                </div>

                <!-- 비밀번호 -->
                <div>
                    <label for="signup_password" class="block text-[11px] font-bold mb-2 uppercase tracking-[0.18em]" style="color:rgba(212,175,55,0.8);">
                        Password
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock" style="color:rgba(212,175,55,0.4);"></i>
                        </span>
                        <input
                            id="signup_password"
                            name="password"
                            type="password"
                            required
                            placeholder="8자 이상, 영문/숫자 조합"
                            class="input-gold pl-11 pr-4 text-sm md:text-base"
                        />
                    </div>
                </div>

                <!-- 비밀번호 확인 -->
                <div>
                    <label for="signup_password_confirm" class="block text-[11px] font-bold mb-2 uppercase tracking-[0.18em]" style="color:rgba(212,175,55,0.8);">
                        Confirm Password
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock" style="color:rgba(212,175,55,0.4);"></i>
                        </span>
                        <input
                            id="signup_password_confirm"
                            name="password_confirm"
                            type="password"
                            required
                            placeholder="비밀번호를 다시 입력하세요"
                            class="input-gold pl-11 pr-4 text-sm md:text-base"
                        />
                    </div>
                </div>

                <!-- 약관 동의 -->
                <div class="space-y-2 text-xs" style="color:rgba(255,255,255,0.7);">
                    <label class="flex items-start gap-2 cursor-pointer select-none">
                        <input type="checkbox" class="mt-0.5 h-4 w-4 rounded cursor-pointer" style="accent-color:#D4AF37;border:1px solid rgba(212,175,55,0.4);" required>
                        <span>
                            LUXX 이용약관 및 개인정보 처리방침에 동의합니다.
                        </span>
                    </label>
                    <p class="text-[11px]" style="color:rgba(255,255,255,0.5);">
                        * 실제 서비스 연동 시에는 이메일 인증, 휴대폰 본인인증, KYC 절차 등이 추가될 수 있습니다.
                    </p>
                </div>

                <!-- 회원가입 버튼 -->
                <button type="submit" class="btn-gold text-base md:text-lg">
                    Create Account
                </button>
            </form>

            <div class="mt-8 pt-4 text-center text-sm" style="border-top:1px solid rgba(212,175,55,0.15);">
                <p style="color:rgba(255,255,255,0.6);">
                    이미 계정이 있으신가요?
                    <a href="login.html" class="font-semibold transition underline-offset-4 hover:underline ml-1" style="color:#D4AF37;" onmouseover="this.style.color='#F5D57B'" onmouseout="this.style.color='#D4AF37'">
                        로그인 하기
                    </a>
                </p>
            </div>
        </div>
    </main>

</body>
</html>
