<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewport-meta">
    <script>
        // 모바일 스마트폰에서도 데스크탑 레이아웃이 자연스럽게 보이도록 처리
        if (screen.width < 1280) {
            document.getElementById('viewport-meta').setAttribute('content', 'width=1280');
        }
    </script>
    <title>로그인 | SISA - Society of International Specialized Auctioneers</title>
    <!-- 폰트 및 아이콘 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#2f4b9f',
                            dark: '#1e326b',
                            accent: '#e6edf7'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-brand-blue text-white font-sans overflow-x-hidden antialiased flex flex-col min-h-screen">

    <!-- 상단 네비게이션 -->
    <header class="fixed w-full top-0 z-50 glass-card border-b-0 border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <!-- 로고 -->
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="flex items-center justify-center">
                    <i class="fa-solid fa-globe text-white text-3xl drop-shadow-md"></i>
                </div>
                <div class="flex flex-col justify-center">
                    <div class="flex items-end gap-2 mb-1">
                        <span class="text-3xl font-black tracking-tighter text-white leading-none">SISA</span>
                        <span class="text-[10px] font-mono bg-white/10 text-blue-200 px-2 py-0.5 rounded border border-white/10 tracking-[0.1em] leading-none mb-0.5">worldsisa.com</span>
                    </div>
                    <span class="text-[9px] text-white/70 font-semibold tracking-[0.18em] uppercase leading-none">
                        Society of International Specialized Auctioneers
                    </span>
                </div>
            </div>

            <!-- 우측 액션 -->
            <div class="flex items-center gap-3 text-sm font-semibold">
                <a href="signup.html" class="hidden sm:inline-flex items-center gap-1 px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 text-white transition">
                    <i class="fa-regular fa-user"></i>
                    <span>회원가입</span>
                </a>
            </div>
        </div>
    </header>

    <!-- 메인 -->
    <main class="flex-grow flex items-center justify-center pt-28 pb-20 px-6 relative z-10">
        <!-- 배경 블러 원 -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-blue-500/20 rounded-full blur-[120px] pointer-events-none -z-10"></div>
        <div class="absolute top-1/4 right-1/4 w-[400px] h-[400px] bg-purple-500/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>

        <!-- 로그인 카드 -->
        <div class="glass-card max-w-lg w-full rounded-[2rem] shadow-2xl border border-white/20 p-8 md:p-10">
            <div class="mb-8 text-center">
                <h1 class="text-3xl md:text-4xl font-bold mb-3">Welcome Back</h1>
                <p class="text-white/70 text-sm md:text-base">
                    로그인하여 SISA 글로벌 옥션과 Vault에 접속하세요.
                </p>
            </div>

            <form action="#" method="post" class="space-y-6">
                <div>
                    <label for="login_email" class="block text-[11px] font-bold text-white/60 mb-2 uppercase tracking-[0.18em]">
                        Email / SISA ID
                    </label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-white/40"></i>
                        </span>
                        <input
                            id="login_email"
                            type="email"
                            required
                            placeholder="member@worldsisa.com"
                            class="w-full bg-black/20 border border-white/15 rounded-xl py-3.5 pl-11 pr-4 text-sm md:text-base text-white placeholder-white/30 focus:outline-none focus:border-blue-400 focus:bg-white/10 transition"
                        />
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="login_password" class="block text-[11px] font-bold text-white/60 uppercase tracking-[0.18em]">
                            Password
                        </label>
                        <a href="#" class="text-xs text-blue-200 hover:text-white transition">
                            비밀번호 찾기
                        </a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-white/40"></i>
                        </span>
                        <input
                            id="login_password"
                            type="password"
                            required
                            placeholder="••••••••"
                            class="w-full bg-black/20 border border-white/15 rounded-xl py-3.5 pl-11 pr-4 text-sm md:text-base text-white placeholder-white/30 focus:outline-none focus:border-blue-400 focus:bg-white/10 transition"
                        />
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer select-none">
                        <input type="checkbox" class="h-4 w-4 rounded border-white/30 bg-white/10 text-blue-500 focus:ring-blue-400">
                        <span class="text-white/70">로그인 상태 유지</span>
                    </label>
                </div>

                <button
                    type="submit"
                    class="w-full bg-brand-accent text-brand-blue font-bold text-base md:text-lg py-3.5 md:py-4 rounded-xl hover:bg-white transition shadow-[0_0_20px_rgba(230,237,247,0.3)] hover:shadow-[0_0_30px_rgba(255,255,255,0.6)] transform hover:-translate-y-0.5 duration-200"
                >
                    Sign In
                </button>
            </form>

            <div class="mt-8 pt-4 border-t border-white/10 text-center text-sm">
                <p class="text-white/60">
                    아직 SISA 계정이 없으신가요?
                    <a href="signup.html" class="font-semibold text-white hover:text-brand-accent underline-offset-4 hover:underline">
                        회원가입 하기
                    </a>
                </p>
            </div>
        </div>
    </main>

</body>
</html>
